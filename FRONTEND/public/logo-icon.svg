<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <clipPath id="ring-clip">
      <rect x="-50" y="0" width="100" height="50"/>
    </clipPath>
  </defs>
  <g transform="translate(60, 60)">
    <ellipse cx="0" cy="0" rx="40" ry="12"
      fill="none" stroke="#8b2a2a" stroke-width="3"
      transform="rotate(-25)" opacity="0.35"/>
    <circle cx="0" cy="0" r="22"
      fill="transparent"
      stroke="#8b2a2a" stroke-width="3.5"/>
    <g clip-path="url(#ring-clip)">
      <ellipse cx="0" cy="0" rx="40" ry="12"
        fill="none" stroke="#8b2a2a" stroke-width="3"
        transform="rotate(-25)"/>
    </g>
  </g>
</svg>
