<svg width="340" height="44" viewBox="0 0 340 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon: circle + ledger + orbital ring — center at (22, 22) -->
  <!-- Circle: r=13.2 (scaled up ~6% from 12.5), stroke 1.7 -->
  <circle cx="22" cy="22" r="13.2" stroke="#3B0001" stroke-width="1.7"/>
  <!-- Ledger line: perfectly centered, extends proportionally with larger circle -->
  <line x1="22" y1="13.5" x2="22" y2="30.5" stroke="#3B0001" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Orbital ring: thinned 10% (0.95→0.85), rx/ry tuned for clean intersection -->
  <ellipse cx="22" cy="22" rx="20.8" ry="5.8" stroke="#3B0001" stroke-width="0.85" fill="none" transform="rotate(-27 22 22)"/>
  <!-- Wordmark: Medium weight, tighter tracking, gap reduced ~6px -->
  <text x="54" y="28.5" fill="#111111" font-family="'Inter Tight', 'IBM Plex Sans', 'Neue Haas Grotesk Display', 'Helvetica Neue', -apple-system, sans-serif" font-size="18.5" font-weight="500" letter-spacing="0.05em">COLLATERAL</text>
</svg>
